<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Polder Labs — Email Signature Banner (600×80) -->
  <!-- Use as an inline image in email signatures -->
  <rect width="600" height="80" fill="#FFFFFF"/>

  <!-- Thin green top border -->
  <rect x="0" y="0" width="600" height="2" fill="#2F5D46"/>

  <!-- Icon (small) -->
  <g transform="translate(16, 12) scale(0.26)">
    <rect x="0" y="0" width="52" height="122" fill="#262C38"/>
    <rect x="0" y="136" width="52" height="74" fill="#262C38"/>
    <rect x="66" y="0" width="52" height="56" fill="#262C38"/>
    <path d="M66 70H170V122H118V210H66Z" fill="#262C38"/>
    <path d="M132 0H236V122H184V56H132Z" fill="#567C57"/>
    <rect x="132" y="136" width="104" height="74" fill="#2F5D46"/>
  </g>

  <!-- Company name -->
  <text x="90" y="40"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="500"
        font-size="24"
        fill="#262C38"
        letter-spacing="-0.01em">Polder Labs</text>

  <!-- Separator dot -->
  <circle cx="232" cy="35" r="2" fill="#D9D9D9"/>

  <!-- Tagline -->
  <text x="244" y="40"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="13"
        fill="#6B7280"
        letter-spacing="0.04em">Built for growth.</text>

  <!-- Website -->
  <text x="90" y="62"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="12"
        fill="#2F5D46">polderlabs.com</text>
</svg>
