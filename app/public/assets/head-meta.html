<!--
  Polder Labs — Head Meta Snippet
  Copy these tags into the <head> of your HTML pages.
  Update URLs to match your deployment domain.
-->

<!-- Favicon -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-16.svg" sizes="16x16" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.svg">
<link rel="manifest" href="/site.webmanifest">

<!-- Theme color (browser chrome) -->
<meta name="theme-color" content="#262C38">
<meta name="msapplication-TileColor" content="#262C38">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:title" content="Polder Labs">
<meta property="og:description" content="Built for growth.">
<meta property="og:image" content="https://yourdomain.com/og-image.svg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Polder Labs">
<meta name="twitter:description" content="Built for growth.">
<meta name="twitter:image" content="https://yourdomain.com/og-image.svg">
