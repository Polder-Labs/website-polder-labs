name: Infra Consistency Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  bicep_json_sync:
    name: Verify Bicep JSON Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Compile Bicep to temp JSON
        uses: azure/CLI@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956
        with:
          inlineScript: |
            az bicep install
            az bicep build --file infra/main.bicep --stdout > infra/main.generated.json

      - name: Compare generated JSON
        run: |
          jq 'del(.metadata._generator.version, .metadata._generator.templateHash)' infra/main.json > infra/main.normalized.json
          jq 'del(.metadata._generator.version, .metadata._generator.templateHash)' infra/main.generated.json > infra/main.generated.normalized.json
          diff -u infra/main.normalized.json infra/main.generated.normalized.json

      - name: Cleanup generated file
        if: always()
        run: rm -f infra/main.generated.json infra/main.normalized.json infra/main.generated.normalized.json
